<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiempo de comida</title>
  <link rel="stylesheet" href="css/main.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="Icon" href="Favicon.png">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>

<body>
  <header class="header">
    <a href="#" class="logo">Tiempo de comida <span>WALMART COSTA RICA</span></a>

    <div class="bx bx-menu" id="menu-icon"></div>
    <nav class="navbar">

      <span class="active-nav"></span>
    </nav>
  </header>
  <section class="home" id="home">
    <div class="home-content">
      <h1>Registra el gafete<span>!</span></h1>
      <br>

      <div class="input-container">
        <input type="text" class="input-box" id="gafeteEmpleado">
      </div>
      <br>
      <br>
      <br>
      <div class="btn-box">
        <button class="btn" id="btnSalida">Salida</button>
        <button class="btn" id="btnEntrada">Entrada</button>
      </div>
    </div>

    <span class="home-imgHover"></span>
  </section>

  <section class="contact" id="contact">
    <h2 class="heading">Tiempos de <span>comida</span></h2>
    <div class="contenedor-busqueda">
<input
        type="text"
        id="inputBuscar"
        class="input-buscar"
        placeholder="Buscar asociado..."
    >
    </div>
    <section class="table-section">
      <div class="tabla-container">
        <table id="tablaRegistros">
          <thead>
            <tr>
              <th>Gafete</th>
              <th>Nombre</th>
              <th>Tiempo de salida</th>
              <th>Estado</th>
              <th>Tiempo de entrada</th>
            </tr>
          </thead>

          <tbody>
            <!-- Los registros se insertarán aquí -->
          </tbody>

        </table>
      </div>



    </section>

    <div class="contenedor-exportar">
      <button class="btn" id="btnExportar">
        Descargar Registro
      </button>
      <button class="btn" id="btnLimpiarTabla">
        Limpiar Registro
      </button>
    </div>

  </section>
  <footer class="footer">
    <div class="footer-text">
      <p>Copyright &copy; 2026 by Anthony Rodriguez | All Rights Reserved</p>
    </div>
    <div class="footer-iconTop">
      <a href="#"><i class='bx bx-up-arrow-alt'></i></a>
    </div>
  </footer>

  <script src="js/main.js"></script>

</body>

</html>
